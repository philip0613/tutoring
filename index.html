<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 스마트 과외 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📚 스마트 과외 시스템</h1>
        <div id="userInfo" class="hidden">
            <span id="userGreeting"></span>
            <button id="logoutBtn">로그아웃</button>
        </div>
    </header>

    <main class="container">
        <section id="loginSection" class="card">
            <h2>로그인</h2>
            <p>이메일과 비밀번호를 입력하세요.</p>
            <input type="email" id="emailInput" placeholder="이메일 (예: teacher@test.com)">
            <input type="password" id="passwordInput" placeholder="비밀번호">
            <button id="loginBtn" class="primary-btn">로그인</button>
        </section>

        <section id="teacherDashboard" class="hidden">
            <div class="dashboard-header admin-bg">
                <h2>👨‍🏫 선생님 대시보드</h2>
            </div>
            
            <div class="grid-container">
                <div class="card">
                    <h3>👥 신규 학생 등록</h3>
                    <input type="text" id="newStudentName" placeholder="학생 이름">
                    <input type="email" id="newStudentEmail" placeholder="학생 이메일">
                    <button id="createStudentBtn" class="primary-btn">학생 계정 생성 (기본비번: 123456)</button>
                </div>

                <div class="card">
                    <h3>📋 나의 학생 목록</h3>
                    <ul id="studentList" class="item-list">
                        <li class="placeholder-text">등록된 학생이 없습니다.</li>
                    </ul>
                </div>
            </div>

            <div id="studentManagePanel" class="card hidden mt-20">
                <h3 id="manageStudentTitle">학생 상세 관리</h3>
                
                <div class="grid-container">
                    <div class="sub-card">
                        <h4>📝 쪽지시험 점수 입력</h4>
                        <input type="text" id="examTitle" placeholder="시험명 (예: 3월 모의고사)">
                        <input type="number" id="examScore" placeholder="점수 (예: 95)">
                        <input type="file" id="examImage" accept="image/*">
                        <button id="uploadExamBtn" class="secondary-btn">시험지 업로드 및 점수 저장</button>
                    </div>

                    <div class="sub-card">
                        <h4>❓ 학생이 올린 질문</h4>
                        <ul id="questionListAdmin" class="item-list">
                            </ul>
                    </div>
                </div>
            </div>
        </section>

        <section id="studentDashboard" class="hidden">
            <div class="dashboard-header student-bg">
                <h2>🎓 학생 대시보드</h2>
            </div>

            <div class="grid-container">
                <div class="card">
                    <h3>📈 내 쪽지시험 결과</h3>
                    <ul id="myExamList" class="item-list">
                        </ul>
                </div>

                <div class="card">
                    <h3>🙋‍♂️ 모르는 문제 질문하기</h3>
                    <input type="text" id="questionText" placeholder="어떤 부분이 이해 안 가시나요?">
                    <input type="file" id="questionImage" accept="image/*">
                    <button id="askQuestionBtn" class="primary-btn">질문 올리기</button>
                    
                    <h4 class="mt-20">나의 질문 내역</h4>
                    <ul id="myQuestionList" class="item-list">
                        </ul>
                </div>
            </div>

            <div class="card mt-20">
                <h3>🔐 비밀번호 변경</h3>
                <input type="password" id="newPassword" placeholder="새로운 비밀번호 (6자리 이상)">
                <button id="changePasswordBtn" class="secondary-btn">비밀번호 변경하기</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
